# .cliff.toml — git-cliff configuration for fissible projects
# Canonical version lives in fissible/.github; copy this file into each repo.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

Commit messages follow [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat",     group = "Added"   },
    { message = "^fix",      group = "Fixed"   },
    { message = "^refactor", group = "Changed" },
    { message = "^perf",     group = "Changed" },
    { message = "^revert",   group = "Fixed"   },
    { message = "^data",     group = "Added"   },
    { message = "^docs",     skip = true       },
    { message = "^chore",    skip = true       },
    { message = "^test",     skip = true       },
    { message = "^style",    skip = true       },
    { message = "^Merge",    skip = true       },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
