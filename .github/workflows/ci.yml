name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: bash / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          path: repo

      - name: Checkout ptyunit
        uses: actions/checkout@v4.2.2
        with:
          repository: fissible/ptyunit
          path: ptyunit

      - name: Checkout shellframe
        uses: actions/checkout@v4.2.2
        with:
          repository: fissible/shellframe
          path: shellframe

      - name: Bootstrap
        working-directory: repo
        run: bash bootstrap.sh

      - name: Install pytest
        run: python3 -m pip install pytest pyte --quiet --break-system-packages

      - name: Run tests
        working-directory: repo
        env:
          SHELLFRAME_DIR: ${{ github.workspace }}/shellframe
        run: bash tests/run.sh
